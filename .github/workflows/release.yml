name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish (single threaded)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Fusion Finder ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          releaseAssetNamePattern: "[name]_[version]_[arch][setup][ext]"

      - name: Attest provenance (single threaded)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe

      - name: Build and publish (multi threaded)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Fusion Finder ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --features mt
          releaseAssetNamePattern: "[name]_[version]_[arch]-mt[setup][ext]"

      - name: Attest provenance (multi threaded)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
