name: Release

# Push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to build the Windows installers on GitHub's runners and publish them to a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release and upload the installers
  id-token: write # sign the build-provenance attestation
  attestations: write # record the attestation

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Fusion Finder ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false

      # Cryptographically link the installers to this commit + workflow run
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
